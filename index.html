<!DOCTYPE html>
<html>

<head>

<title>Nagpur Digital Twin</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

#map{
height:70vh;
}

.panel{
padding:15px;
background:#1b1b1b;
}

button{
padding:10px;
margin:5px;
background:green;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<h2>Nagpur Digital Twin – SDG 11</h2>

<div id="map"></div>

<div class="panel">

Green Cover: <span id="green">--</span>%<br>
Heat Risk: <span id="heat">--</span>%<br>
Flood Risk: <span id="flood">--</span>%<br>

<h3>SDG Score: <span id="score">--</span></h3>

<button onclick="increaseGreen()">
Increase Green Cover
</button>

<button onclick="flashFlood()">
Flash Flood
</button>

</div>

<script>

// create map

var map = L.map('map').setView(
[21.1458,79.0882], 11
);


// OpenStreetMap layer

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);


// flood zone

L.circle(
[21.12,79.05],
{
color:'red',
radius:3000
}
).addTo(map)
.bindPopup("Flood Risk");


// heat zone

L.circle(
[21.18,79.12],
{
color:'orange',
radius:2000
}
).addTo(map)
.bindPopup("Heat Island");


// load backend data

function load(){

fetch("http://127.0.0.1:8000/status")

.then(res=>res.json())

.then(data=>{

green.innerText=data.green;
heat.innerText=data.heat;
flood.innerText=data.flood;
score.innerText=data.score;

});

}


// buttons

function increaseGreen(){

fetch("http://127.0.0.1:8000/simulate/green")
.then(load)

}

function flashFlood(){

fetch("http://127.0.0.1:8000/simulate/flood")
.then(load)

}


load();

</script>

</body>

</html>
